<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Hampus Andersson – Resume</title>

<link rel="preconnect" href="https://fonts.gstatic.com" />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet" />

<style>
:root {
  --clr-bg-light: #fdfdfd;
  --clr-bg-dark: #121212;
  --clr-fg-light: #1e1e1e;
  --clr-fg-dark: #eaeaea;
  --clr-primary: #3b82f6;   
  --clr-primary-dark: #1e3a8a; 
  --radius-lg: 0.75rem;
  --radius-sm: 0.375rem;
  --shadow-card: 0 4px 12px rgba(0, 0, 0, 0.08);
  --shadow-card-dark: 0 4px 12px rgba(0, 0, 0, 0.4);
  --space-xl: 4rem;
  --space-lg: 2.5rem;
  --space-md: 1.5rem;
  --space-sm: 0.75rem;
}

*, *::before, *::after { box-sizing: border-box; }

body {
  margin: 0;
  font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
  line-height: 1.6;
  background-color: var(--clr-bg-light);
  color: var(--clr-fg-light);
  -webkit-font-smoothing: antialiased;
}

a { color: var(--clr-primary); text-decoration: none; }
a:hover { text-decoration: underline; }

header {
  background: linear-gradient(135deg, color-mix(in srgb, var(--clr-primary-dark) 95%, transparent) 0%, color-mix(in srgb, var(--clr-primary) 85%, transparent) 100%);
  color: #fff;
  text-align: center;
  padding: var(--space-lg) var(--space-sm);
  box-shadow: 0 4px 10px rgba(0,0,0,0.15);
}

header h1 {
  margin: 0 0 .25rem;
  font-size: clamp(2rem, 4vw + .5rem, 3rem);
  font-weight: 500;
  text-rendering: optimizeLegibility;
  -webkit-font-smoothing: antialiased;
}

header p {
  text-rendering: optimizeLegibility;
  margin: 0.25rem 0;
  font-size: 1.125rem;
}

.main-container {
  max-width: 960px;
  margin: 0 auto;
  padding: var(--space-xl) var(--space-sm);
}

section {
  margin-bottom: var(--space-xl);
}

section h2 {
  margin: 0 0 var(--space-sm);
  font-size: 1.625rem;
  font-weight: 500;
  text-rendering: optimizeLegibility;
  -webkit-font-smoothing: antialiased;
  border-bottom: 3px solid var(--clr-primary);
  display: inline-block;
  padding-bottom: 0.25rem;
}

.card {
  background-color: #fff;
  border-radius: var(--radius-lg);
  box-shadow: var(--shadow-card);
  padding: var(--space-md) var(--space-lg);
  margin-top: var(--space-sm);
}

ul.plain {
  list-style: none;
  padding: 0;
  margin: 0;
}

ul.plain li {
  margin-bottom: 0.5rem;
}

.tags {
  display: flex;
  flex-wrap: wrap;
  gap: 0.5rem;
}

.chip {
  background: var(--clr-primary);
  color: #fff;
  padding: 0.35rem 0.75rem;
  border-radius: var(--radius-sm);
  font-size: 0.825rem;
  transition: background 0.2s ease;
}

.chip:hover { background: var(--clr-primary-dark); }

@media (prefers-color-scheme: dark) {
  body {
    background-color: var(--clr-bg-dark);
    color: var(--clr-fg-dark);
  }
  header {
    box-shadow: none;
  }
  .card {
    background-color: #1f1f1f;
    box-shadow: var(--shadow-card-dark);
  }
}

.fade-in { opacity: 0; animation: fadeIn 0.6s forwards ease-in-out; }
@keyframes fadeIn { to { opacity: 1; } }
</style>

<script defer src="https://unpkg.com/react@18/umd/react.development.js"></script>
<script defer src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>

</body>
</html>
